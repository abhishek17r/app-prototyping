<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
<title>Proto-Kit · Starter</title>
<link rel="stylesheet" href="../lib/shell.css" />
<link rel="stylesheet" href="../lib/sheet.css" />
</head>
<body>
  <div class="phone">
    <div class="island"></div>
    <div class="statusbar">
      <div class="left"><span>9:41</span></div>
      <div class="right"><span>100%</span></div>
    </div>

    <div class="app">
      <div class="screen">
        <!-- Replace this block with your product's title-page UI. -->
        <div class="title-card">
          <h1>Item title</h1>
          <div class="subline"><span>Subtitle · category</span></div>
          <p class="desc">
            Blank phone-shell starter. Edit this file to skin it for any product,
            then keep the <code style="background:#222;padding:1px 5px;border-radius:3px;">+ Add to list</code>
            button below — the proto-kit lib handles the rest.
          </p>
        </div>

        <div class="action-row">
          <button type="button" class="action" id="addToListBtn">
            <div class="icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            </div>
            <span class="lbl" id="addToListLbl">Add to list</span>
          </button>
        </div>
      </div>

      <div class="tabbar">
        <div class="tabi active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11 12 3l9 8v10a1 1 0 0 1-1 1h-5v-7h-6v7H4a1 1 0 0 1-1-1V11z"/></svg>
          <span>Home</span>
        </div>
        <div class="tabi">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <span>Search</span>
        </div>
        <div class="tabi">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
          <span>You</span>
        </div>
      </div>
    </div>
  </div>

  <script src="../lib/state.js"></script>
  <script src="../lib/sheet.js"></script>
  <script>
    ProtoKit.init({
      brand: { name: "Starter", color: "#22c55e" },
      item: { id: "demo-item-1", title: "Item title" },
      sheetTitle: "Add to list",
      actionLabel: "Add to list",
      defaultList: { id: "favorites", name: "Favorites", color: "#22c55e" },
      customLists: [
        { id: "weekend", name: "Weekend", color: "#0ea5e9" },
        { id: "deep-cuts", name: "Deep cuts", color: "#7c3aed" }
      ],
      unit: "items"
    });
  </script>
</body>
</html>
