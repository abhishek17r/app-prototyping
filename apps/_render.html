<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
<title>Prototype preview</title>
<link rel="stylesheet" href="../lib/shell.css" />
<link rel="stylesheet" href="../lib/sheet.css" />
<style>
  body{padding:0;}
  .hero{
    width:100%; aspect-ratio: 384/220;
    background:#2a2730 center/cover no-repeat;
    position:relative;
  }
  .hero::after{
    content:""; position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(0,0,0,.1) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,.8) 100%);
  }
  .placeholder-hero{
    display:flex;align-items:center;justify-content:center;
    color:#444; font-size:13px; font-weight:600; letter-spacing:.05em;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="island"></div>
    <div class="statusbar">
      <div class="left"><span>9:41</span></div>
      <div class="right"><span>100%</span></div>
    </div>

    <div class="app">
      <div class="screen" id="screen"></div>
      <div class="tabbar">
        <div class="tabi active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11 12 3l9 8v10a1 1 0 0 1-1 1h-5v-7h-6v7H4a1 1 0 0 1-1-1V11z"/></svg>
          <span>Home</span>
        </div>
        <div class="tabi">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <span>Search</span>
        </div>
        <div class="tabi">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
          <span>You</span>
        </div>
      </div>
    </div>
  </div>

  <script src="../lib/state.js"></script>
  <script src="../lib/sheet.js"></script>
  <script>
    function esc(s){
      return String(s||"").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    }

    function readConfig(){
      const hash = window.location.hash.slice(1);
      if(!hash) return null;
      try{
        return JSON.parse(decodeURIComponent(atob(hash)));
      }catch(_){ return null; }
    }

    function renderTitlePage(cfg){
      const tp = cfg.titlePage || {};
      const screen = document.getElementById("screen");
      const heroHTML = tp.hero
        ? `<div class="hero" style="background-image:url('${esc(tp.hero)}')"></div>`
        : `<div class="hero placeholder-hero">HERO</div>`;
      const descHTML = tp.desc ? `<p class="desc">${esc(tp.desc)}</p>` : "";
      const subHTML = tp.subtitle ? `<div class="subline"><span>${esc(tp.subtitle)}</span></div>` : "";

      screen.innerHTML = `
        ${heroHTML}
        <div class="title-card">
          <h1>${esc(tp.title || "Item title")}</h1>
          ${subHTML}
          ${descHTML}
        </div>
        <div class="action-row">
          <button type="button" class="action" id="addToListBtn">
            <div class="icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            </div>
            <span class="lbl" id="addToListLbl">${esc(cfg.actionLabel || "Add to list")}</span>
          </button>
        </div>
      `;
    }

    function cleanup(){
      // Remove sheet/scrim/toast injected by previous ProtoKit.init
      document.querySelectorAll(".scrim, #protoSheet, #protoToast").forEach(n => n.remove());
    }

    function mount(){
      cleanup();
      const cfg = readConfig() || {
        brand: { name: "Demo", color: "#22c55e" },
        item: { id: "demo", title: "Item title" },
        defaultList: { id: "favorites", name: "Favorites", color: "#22c55e" },
        customLists: [],
        unit: "items",
        actionLabel: "Add to list",
        sheetTitle: "Add to list",
        titlePage: { title: "Item title", subtitle: "Subtitle · category" }
      };
      // Clear any prior persisted state for this brand so previews don't drift.
      try{
        const ns = `protokit:${cfg.brand.name.toLowerCase().replace(/\s+/g,"-")}`;
        localStorage.removeItem(ns + ":lists");
        localStorage.removeItem(ns + ":membership");
      }catch(_){}
      renderTitlePage(cfg);
      ProtoKit.init(cfg);
    }

    mount();
    window.addEventListener("hashchange", mount);

    // Listen for live updates from the parent builder.
    window.addEventListener("message", (e) => {
      if(e.data && e.data.type === "config"){
        const encoded = btoa(encodeURIComponent(JSON.stringify(e.data.config)));
        if("#" + encoded !== window.location.hash){
          window.location.hash = encoded;
        }
      }
    });
  </script>
</body>
</html>
